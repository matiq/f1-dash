services:
  api:
    build:
      context: ./api
    ports:
      - 4010:80
    environment:
      - RUST_LOG=api=debug
      - ADDRESS=0.0.0.0:80
      - ORIGIN=http://localhost:3000

  realtime:
    build:
      context: ./realtime
    ports:
      - 4000:80
    environment:
      - RUST_LOG=realtime=debug
      - ADDRESS=0.0.0.0:80
      - ORIGIN=http://localhost:3000

  web:
    build:
      context: ./dashboard
    depends_on:
      - realtime
      - api
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_LIVE_URL=http://localhost:4000
      - API_URL=http://localhost:4010
